syntax = "proto3";

service TaskManager {
  rpc GetTasksForUser (UserRequest) returns (stream Task);
  rpc UpdateTaskStatus (UpdateTaskRequest) returns (UpdateTaskResponse);
}

message UserRequest {
  int32 user_id = 1;
}

message Task {
  int32 id = 1;        // номер задачи (локальный)
  string title = 2;
  bool completed = 3;
}

message UpdateTaskRequest {
  int32 user_id = 1;
  int32 task_number = 2;
  bool completed = 3;
}

message UpdateTaskResponse {
  string message = 1;
}
