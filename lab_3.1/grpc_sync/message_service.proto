syntax = "proto3";

package message;

service MessageService {
  rpc StockManagement (StockRequest) returns (StockResponse);
  rpc GenerateUUID (UUIDRequest) returns (UUIDResponse);
  rpc ReverseString (ReverseRequest) returns (ReverseResponse);
}

message StockRequest {
  string product_id = 1;
  int32 sold_quantity = 2;
}

message StockResponse {
  int32 remaining_quantity = 1;
}

message UUIDRequest {
  string any_text = 1;
}

message UUIDResponse {
  string uuid = 1;
}

message ReverseRequest {
  string original_text = 1;
}

message ReverseResponse {
  string reversed_text = 1;
}